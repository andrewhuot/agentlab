services:
  autoagent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - autoagent-data:/app/data
    env_file:
      - .env
    environment:
      - AUTOAGENT_DB=/app/data/conversations.db
      - AUTOAGENT_CONFIGS=/app/data/configs
      - AUTOAGENT_MEMORY_DB=/app/data/optimizer_memory.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  autoagent-data:
