apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: agentlab
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "1"
        run.googleapis.com/cpu-throttling: "false"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/agentlab/agentlab:latest
          ports:
            - containerPort: 8000
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          env:
            - name: AGENTLAB_DB
              value: /app/data/conversations.db
            - name: AGENTLAB_CONFIGS
              value: /app/data/configs
            - name: AGENTLAB_MEMORY_DB
              value: /app/data/optimizer_memory.db
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: google-api-key
                  key: latest
          startupProbe:
            httpGet:
              path: /api/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/health/ready
              port: 8000
            periodSeconds: 30
